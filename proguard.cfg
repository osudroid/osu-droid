# =============================================================================
# osu!droid ProGuard configuration
# =============================================================================

# ----- General ---------------------------------------------------------------
-optimizationpasses 5
-dontusemixedcaseclassnames
-dontskipnonpubliclibraryclasses
-dontpreverify
-verbose

# Keep source file names and line numbers so Crashlytics stack traces are
# human-readable without needing to upload a mapping file.
-keepattributes SourceFile,LineNumberTable,*Annotation*,Signature,Exceptions,InnerClasses

# ----- Android components ----------------------------------------------------
-keep public class * extends android.app.Activity
-keep public class * extends android.app.Application
-keep public class * extends android.app.Service
-keep public class * extends android.content.BroadcastReceiver
-keep public class * extends android.content.ContentProvider
-keep public class * extends android.app.backup.BackupAgentHelper
-keep public class com.android.vending.licensing.ILicensingService
-keep class android.view.WindowInsetsController

-keepclasseswithmembernames class * {
    native <methods>;
}
-keepclasseswithmembers class * {
    public <init>(android.content.Context, android.util.AttributeSet);
}
-keepclasseswithmembers class * {
    public <init>(android.content.Context, android.util.AttributeSet, int);
}
-keepclassmembers class * extends android.app.Activity {
    public void *(android.view.View);
}
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}
-keep class * implements android.os.Parcelable {
    public static final android.os.Parcelable$Creator *;
}
-keepnames class * implements java.io.Serializable
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    !static !transient <fields>;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
    *;
}
-keep public class **.R$* {
    public static final int *;
}
-keepclassmembers class * {
    public <init>(org.json.JSONObject);
}

# ----- AndEngine GLES2 -------------------------------------------------------
# The entire org.andengine package is accessed reflectively and via JNI.
-keep class org.andengine.** { *; }
-dontwarn org.andengine.**

# ----- LibBASS (native audio) ------------------------------------------------
-keep class com.un4seen.** { *; }

# ----- AndroidX / Support Libraries ------------------------------------------
-keep class androidx.** { *; }
-keep public class * extends androidx.**
-dontwarn android.support.**
-keep class android.support.** { *; }
-keep public class * extends android.support.v4.**
-keep public class * extends android.app.Fragment

# ----- Room (KSP-generated _Impl classes must not be removed) ----------------
-keep class * extends androidx.room.RoomDatabase
-keep @androidx.room.Entity class * { *; }
-keep @androidx.room.Dao interface * { *; }
-keep @androidx.room.Database class * { *; }
-keep @androidx.room.TypeConverter class * { *; }
# Room generates *_Impl files via KSP — keep them so the database can open.
-keep class com.osudroid.data.** { *; }

# ----- kotlinx.serialization -------------------------------------------------
# The serialization compiler plugin generates *$$serializer companion objects.
-dontnote kotlinx.serialization.AnnotationsKt
-keep,includedescriptorclasses class com.osudroid.**$$serializer { *; }
-keepclassmembers class com.osudroid.** {
    *** Companion;
}
-keepclasseswithmembers class com.osudroid.** {
    kotlinx.serialization.KSerializer serializer(...);
}

# ----- Kotlin reflection (mod system uses KClass.createInstance()) -----------
# Mod subclasses are instantiated reflectively — keep their no-arg constructors.
-keep class com.osudroid.mods.** { *; }
-keep class kotlin.reflect.** { *; }
-dontwarn kotlin.reflect.**

# ----- Kotlin runtime --------------------------------------------------------
-keep class kotlin.** { *; }
-keep class kotlin.Metadata { *; }
-dontwarn kotlin.**
-keep class kotlinx.** { *; }
-keepclassmembers class **$WhenMappings { <fields>; }
-keepclassmembers class kotlin.Metadata { public <methods>; }

# ----- Socket.IO (multiplayer real-time events) ------------------------------
-keep class io.socket.** { *; }
-dontwarn io.socket.**

# ----- OkHttp / okio ---------------------------------------------------------
-keepnames class okhttp3.internal.publicsuffix.PublicSuffixDatabase
-dontwarn okhttp3.**
-dontwarn okio.**
-dontwarn org.codehaus.mojo.animal_sniffer.*
-dontwarn org.bouncycastle.jsse.**
-dontwarn org.conscrypt.*
-dontwarn org.openjsse.**
-dontwarn com.android.org.conscrypt.SSLParametersImpl
-dontwarn org.apache.harmony.xnet.provider.jsse.SSLParametersImpl
-dontwarn javax.annotation.**
-dontwarn java.lang.invoke.*

# ----- Firebase (Crashlytics, Analytics, Messaging) --------------------------
-keep class com.google.firebase.** { *; }
-dontwarn com.google.firebase.**
-keep class com.google.android.gms.** { *; }
-dontwarn com.google.android.gms.**

# ----- OEM push service providers --------------------------------------------
-keep class com.uc.** { *; }
-keep class com.zui.** { *; }
-keep class com.miui.** { *; }
-keep class com.heytap.** { *; }
-keep class com.vivo.** { *; }

# ----- Misc ------------------------------------------------------------------
-keep class libcore.** { *; }
-dontwarn android.view.**
